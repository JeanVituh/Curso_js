<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: sans-serif;
        }

        label {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <form action="#" method="get" target="_blank" autocomplete="off">

        <p> O formulario </p>
        <p>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome">
        </p>
        <p>
            <label for="dev1"> sou um dev 1</label>
            <input type="checkbox" id="dev1" name="dev1" value="sim"><br>
            <label for="dev2"> Sou um dev 2</label>
            <input type="checkbox" id="dev2" name="dev2" value="sim"><br>
            <label for="dev3"> Sou um dev 3</label>
            <input type="checkbox" id="dev3" name="dev3" value="sim">
        </p>
        <p>
            Gênero:<br>
            <label for="feminino"> feminino</label>
            <input type="radio" id="feminino" name="genero" value="feminino"><br>
            <label for="masculino"> masculino </label>
            <input type="radio" id="masculino" name="genero" value="masculino"><br>
            <label for="outro"> outro</label>
            <input type="radio" id="outro" name="genero" value="sim">
        </p>
        <p>
            <label for="datetime">Data:</label>
            <input type="datetime-local" id="datetime" name="datetime">
        </p>
        <p>
            <label for="time">Data:</label>
            <input type="time" id="time" name="time">
        </p>
        <p>
            <label for="cor">Cor preferida:</label>
            <input type="color" id="cor" name="cor">
        </p>
        <p>
            <label for="file">Sua foto:</label>
            <input type="file" id="file" name="file" accept=".png">
        </p>
        <p>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email@gmail.com">
        </p>
        <p>
            <label for="password">Sua senha:</label>
            <input type="password" id="password" name="password" placeholder="digite sua senha">
        </p>
        <p>
            <label for="number">Numero:</label>
            <input type="number" id="number" name="number" step="5" min="10" max="50">
        </p>
        <p>
            <label for="range">Range:</label>
            <input type="range" id="range" name="range" list="tickmarkers">

            <datalist id="tickmarkers">
                <option value="0"></option>
                <option value="25"></option>
                <option value="50"></option>
                <option value="75"></option>
                <option value="100"></option>
            </datalist>
        </p>

        <p>
            <label for="url">Sua url:</label>
            <input type="url" id="url" name="url" placeholder="url">
        </p>
        <p>
            <label for="search">Sua url:</label>
            <input type="search" id="search" name="search" placeholder="search">
        </p>
        <p>
            <label for="select">Selecione alguma opção:</label>
            <select id="select" name="select">
                <option value="qualquer 1" label="label 1">
                <option value="qualquer 2" label="label 2">
                <option value="qualquer 3" label="label 3">
                <option value="qualquer 4" label="label 4">
                </select>
        </p>
         <p>
            <label for="textarea">textarea:</label>
           <textarea name="textarea" id="textarea" rows="3" cols="9"></textarea>
        </p>







        <p>
            <button type="submit"> enviar </button>
            <button type="reset"> reset </button>
        </p>

    </form>

</body>

</html>
